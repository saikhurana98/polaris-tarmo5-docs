<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <script>
    (function() {
      var saved = localStorage.getItem('polaris-theme');
      var preferred = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', preferred);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-mark">PG</span>
        <span class="logo-text">Polaris GP</span>
      </a>
      <div class="header-right">
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
          <a href="{{ '/week2/' | relative_url }}" {% if page.url == '/week2/' %}class="active"{% endif %}>Week 2</a>
          <a href="{{ '/week1/' | relative_url }}" {% if page.url == '/week1/' %}class="active"{% endif %}>Week 1</a>
          <a href="{{ '/announcement/' | relative_url }}" {% if page.url == '/announcement/' %}class="active"{% endif %}>Announcement</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="site-wrapper">
    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      Polaris GP &middot; Build fast. Race faster.
    </footer>
  </div>

  <script>
    // Theme toggle
    (function() {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var html = document.documentElement;
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('polaris-theme', next);
      });
    })();

    // Copy button
    (function() {
      var btns = document.querySelectorAll('.copy-btn');
      for (var i = 0; i < btns.length; i++) {
        (function(btn) {
          btn.addEventListener('click', function(e) {
            e.preventDefault();
            var block = btn.closest('.copy-block');
            if (!block) return;
            var content = block.querySelector('.copy-content');
            if (!content) return;
            var text = content.innerText || content.textContent;
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(text).then(function() {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(function() {
                  btn.textContent = 'Copy';
                  btn.classList.remove('copied');
                }, 2000);
              }).catch(function() {
                fallbackCopy(text, btn);
              });
            } else {
              fallbackCopy(text, btn);
            }
          });
        })(btns[i]);
      }

      function fallbackCopy(text, btn) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(function() {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        } catch(e) {
          btn.textContent = 'Failed';
          setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
        }
        document.body.removeChild(ta);
      }
    })();

    // Interactive checklist
    (function() {
      var items = document.querySelectorAll('.checklist li');
      for (var i = 0; i < items.length; i++) {
        items[i].style.cursor = 'pointer';
        items[i].addEventListener('click', function() {
          this.classList.toggle('checked');
        });
      }
    })();
  </script>
</body>
</html>
