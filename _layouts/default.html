<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Respect system preference, allow manual override -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var preferred = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', preferred);
    })();
  </script>
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-mark">PG</span>
        Polaris GP
      </a>
      <div class="header-right">
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
          <a href="{{ '/week1/' | relative_url }}" {% if page.url == '/week1/' %}class="active"{% endif %}>Week 1</a>
          <a href="{{ '/announcement/' | relative_url }}" {% if page.url == '/announcement/' %}class="active"{% endif %}>Announcement</a>
        </nav>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
          <span class="icon-sun">&#9788;</span>
          <span class="icon-moon">&#9790;</span>
        </button>
      </div>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      Polaris GP &middot; Build fast. Race faster.
    </footer>
  </div>

  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>
</body>
</html>
