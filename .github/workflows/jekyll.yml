name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Inject live telemetry config
        env:
          LIVE_WS_URL: ${{ secrets.LIVE_WS_URL }}
          LIVE_WS_TOKEN: ${{ secrets.LIVE_WS_TOKEN }}
        run: |
          mkdir -p _data
          {
            printf 'ws_url: "%s"\n' "${LIVE_WS_URL}"
            printf 'ws_token: "%s"\n' "${LIVE_WS_TOKEN}"
          } > _data/live.yml
          echo "Wrote _data/live.yml (url set: $([ -n "$LIVE_WS_URL" ] && echo yes || echo no), token set: $([ -n "$LIVE_WS_TOKEN" ] && echo yes || echo no))"
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
